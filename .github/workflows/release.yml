# Реліз на pub.dev + GitHub Release після push тега v* (наприклад v1.0.0).
# pubspec.yaml → version: має збігатися з тегом без префікса v.
#
# Налаштування pub.dev (один раз): https://dart.dev/tools/pub/automated-publishing
# Репозиторій GitHub → pub.dev → Enable automated publishing → OIDC (id-token: write нижче).

name: Release (pub.dev + GitHub)

on:
  push:
    tags:
      - "v*"
  # Ручний запуск: test + analyze + pub publish --dry-run (публікація лише при push тега v*).
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify pubspec version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "Git tag (no v): $TAG"
          echo "pubspec version:   $VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Версія в pubspec ($VER) не збігається з тегом (v$TAG). Оновіть pubspec або перейменуйте тег."
            exit 1
          fi
          echo "RELEASE_VERSION=$TAG" >> "$GITHUB_ENV"

      - name: Setup Java (для перевірки Android-частини плагіна)
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Versions
        run: |
          flutter --version
          dart --version

      - name: Dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: pub publish --dry-run
        run: flutter pub publish --dry-run

      - name: Publish to pub.dev
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set +e
          output=$(dart pub publish -f 2>&1)
          rc=$?
          echo "$output"
          if [ "$rc" -ne 0 ]; then
            if echo "$output" | grep -qi "already exists"; then
              echo "Версія вже на pub.dev — продовжуємо до GitHub Release."
              exit 0
            fi
            exit "$rc"
          fi

      - name: GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: bidscube_sdk_flutter ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          body: |
            ## Встановлення (pub.dev)

            ```yaml
            dependencies:
              bidscube_sdk_flutter: ^${{ env.RELEASE_VERSION }}
            ```

            Документація: [pub.dev/packages/bidscube_sdk_flutter](https://pub.dev/packages/bidscube_sdk_flutter)

            Див. також [RELEASE.md](https://github.com/${{ github.repository }}/blob/main/RELEASE.md) у репозиторії.
